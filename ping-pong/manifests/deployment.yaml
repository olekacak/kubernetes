apiVersion: apps/v1
kind: Deployment

metadata:
  name: ping-pong

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ping-pong

  template:
    metadata:
      labels:
        app: ping-pong

    spec:
      containers:
        - name: ping-pong
          image: olekacak/ping-pong:2.1
          imagePullPolicy: Always

          env:
            - name: PORT
              value: "8000"

          ports:
            - containerPort: 8000